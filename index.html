<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#6366f1">
<title>Daily Tracker</title>
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg:#0f172a;--bg2:#1e293b;--bg3:#334155;
    --accent:#6366f1;--accent2:#818cf8;
    --green:#22c55e;--yellow:#f59e0b;--red:#ef4444;
    --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
    --radius:16px;--gap:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,'Noto Sans KR',sans-serif;min-height:100vh;overscroll-behavior:none;}

  .header{background:var(--bg2);padding:18px 20px 14px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--bg3);}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .app-title{font-size:18px;font-weight:700;color:var(--accent2);}
  .date-str{font-size:13px;color:var(--text2);}
  .header-stats{display:flex;gap:10px;}
  .stat-pill{background:var(--bg3);border-radius:20px;padding:6px 14px;font-size:13px;display:flex;align-items:center;gap:6px;}
  .stat-pill .val{font-weight:700;color:var(--accent2);}
  .prog-wrap{margin:10px 0 2px;}
  .prog-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:5px;}
  .prog-bar{height:8px;background:var(--bg3);border-radius:10px;overflow:hidden;}
  .prog-fill{height:100%;border-radius:10px;transition:width .4s ease;background:linear-gradient(90deg,var(--accent),var(--accent2));}

  .tabs{display:flex;background:var(--bg2);padding:0 20px;border-bottom:1px solid var(--bg3);overflow-x:auto;gap:4px;}
  .tab{padding:10px 16px;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;}
  .tab.active{color:var(--accent2);border-bottom-color:var(--accent);font-weight:600;}

  .main{padding:16px 20px 100px;max-width:600px;margin:0 auto;}
  .view{display:none;}
  .view.active{display:block;}

  .cat-card{background:var(--bg2);border-radius:var(--radius);margin-bottom:var(--gap);overflow:hidden;border:1px solid var(--bg3);}
  .cat-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;}
  .cat-title{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;}
  .cat-count{font-size:12px;background:var(--bg3);padding:2px 8px;border-radius:10px;color:var(--text2);}
  .cat-prog{height:3px;background:var(--bg3);margin:0 16px 10px;border-radius:3px;overflow:hidden;}
  .cat-prog-fill{height:100%;border-radius:3px;transition:width .4s;}

  .item{display:flex;align-items:center;padding:12px 16px;border-top:1px solid var(--bg3);gap:12px;transition:background .15s;user-select:none;}
  .item.done .item-label{color:var(--text3);text-decoration:line-through;}
  .item.done .item-note{color:var(--text3);}
  .checkbox{width:22px;height:22px;border-radius:7px;border:2px solid var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;cursor:pointer;}
  .item.done .checkbox{background:var(--green);border-color:var(--green);}
  .check-icon{display:none;color:#fff;font-size:13px;font-weight:800;}
  .item.done .check-icon{display:block;}
  .item-content{flex:1;cursor:pointer;}
  .item-label{font-size:14px;line-height:1.4;transition:color .2s;}
  .item-note{font-size:11px;color:var(--text3);margin-top:2px;}
  .item-edit-btn{background:none;border:none;color:var(--text3);font-size:16px;padding:4px 6px;cursor:pointer;flex-shrink:0;transition:color .2s;}
  .item-edit-btn:active{color:var(--accent2);}

  .add-item-btn{display:flex;align-items:center;gap:8px;padding:10px 16px;border-top:1px solid var(--bg3);color:var(--text3);font-size:13px;cursor:pointer;transition:color .2s;}
  .add-item-btn:hover{color:var(--accent2);}

  /* Calendar */
  .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .cal-nav{background:var(--bg2);border:none;color:var(--text2);font-size:20px;padding:6px 12px;border-radius:8px;cursor:pointer;}
  .cal-month{font-size:16px;font-weight:700;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal-day-label{text-align:center;font-size:11px;color:var(--text3);padding:4px 0;}
  .cal-day{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;background:var(--bg2);position:relative;}
  .cal-day.today{border:2px solid var(--accent);}
  .cal-day.empty{background:transparent;}
  .cal-day-num{font-size:12px;font-weight:500;}
  .cal-dot{width:5px;height:5px;border-radius:50%;margin-top:2px;}
  .cal-day.rate-100 .cal-dot{background:var(--green);}
  .cal-day.rate-hi .cal-dot{background:var(--yellow);}
  .cal-day.rate-lo .cal-dot{background:var(--red);}
  .cal-day.rate-0 .cal-dot{background:var(--text3);}

  /* Stats */
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
  .stat-card{background:var(--bg2);border-radius:var(--radius);padding:16px;border:1px solid var(--bg3);text-align:center;}
  .stat-card .big{font-size:32px;font-weight:800;color:var(--accent2);}
  .stat-card .lbl{font-size:12px;color:var(--text2);margin-top:4px;}
  .weekly-bar{background:var(--bg2);border-radius:var(--radius);padding:16px;border:1px solid var(--bg3);margin-bottom:12px;}
  .weekly-title{font-size:14px;font-weight:600;margin-bottom:12px;}
  .bar-chart{display:flex;align-items:flex-end;gap:8px;height:80px;}
  .bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
  .bar-col{width:100%;border-radius:4px 4px 0 0;transition:height .4s;background:linear-gradient(to top,var(--accent),var(--accent2));min-height:4px;}
  .bar-label{font-size:10px;color:var(--text3);}
  .bar-pct{font-size:10px;color:var(--text2);}

  /* Settings */
  .settings-section{background:var(--bg2);border-radius:var(--radius);margin-bottom:var(--gap);border:1px solid var(--bg3);overflow:hidden;}
  .settings-title{padding:14px 16px;font-size:14px;font-weight:600;border-bottom:1px solid var(--bg3);display:flex;align-items:center;justify-content:space-between;}
  .setting-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--bg3);}
  .setting-label{font-size:14px;}
  .setting-sub{font-size:11px;color:var(--text2);margin-top:2px;}
  .row-btns{display:flex;gap:4px;}
  .del-btn{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:4px 8px;}
  .edit-icon-btn{background:none;border:none;color:var(--text2);font-size:15px;cursor:pointer;padding:4px 8px;}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;z-index:200;backdrop-filter:blur(4px);}
  .modal-bg.hidden{display:none;}
  .modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:600px;margin:0 auto;animation:slideUp .25s ease;}
  @keyframes slideUp{from{transform:translateY(100%)}}
  .modal h3{font-size:16px;font-weight:700;margin-bottom:18px;}
  .modal input,.modal select{width:100%;background:var(--bg3);border:none;border-radius:10px;color:var(--text);font-size:15px;padding:12px 14px;margin-bottom:12px;outline:none;}
  .modal-btns{display:flex;gap:10px;margin-top:4px;}
  .btn{flex:1;padding:13px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s;}
  .btn:active{opacity:.8;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-cancel{background:var(--bg3);color:var(--text2);}

  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--bg3);display:flex;padding:8px 0 20px;z-index:100;}
  .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 0;color:var(--text3);transition:color .2s;}
  .nav-btn.active{color:var(--accent2);}
  .nav-icon{font-size:20px;}
  .nav-label{font-size:10px;font-weight:500;}

  .confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:300;}
  .confetti-piece{position:absolute;width:8px;height:8px;border-radius:2px;animation:confettiFall 1.2s ease forwards;}
  @keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

  .done-banner{background:linear-gradient(135deg,#22c55e,#16a34a);border-radius:var(--radius);padding:16px;margin-bottom:var(--gap);text-align:center;display:none;}
  .done-banner.show{display:block;animation:pulse .5s ease;}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
  .done-banner h3{font-size:18px;font-weight:800;margin-bottom:4px;}
  .done-banner p{font-size:13px;opacity:.9;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="app-title">📋 Daily Tracker</div>
      <div class="date-str" id="dateStr"></div>
    </div>
    <div class="header-stats">
      <div class="stat-pill"><span>🔥</span><span class="val" id="streakVal">0</span><span>일</span></div>
      <div class="stat-pill"><span class="val" id="todayPct">0%</span></div>
    </div>
  </div>
  <div class="prog-wrap">
    <div class="prog-label"><span id="progDone">0/0 완료</span><span id="progMsg"></span></div>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-view="today">오늘</div>
  <div class="tab" data-view="calendar">캘린더</div>
  <div class="tab" data-view="stats">통계</div>
  <div class="tab" data-view="settings">설정</div>
</div>

<div class="main">
  <div class="view active" id="view-today">
    <div class="done-banner" id="doneBanner">
      <h3>🎉 오늘 목표 완료!</h3>
      <p>모든 항목을 달성했습니다. 내일도 화이팅!</p>
    </div>
    <div id="catList"></div>
  </div>

  <div class="view" id="view-calendar">
    <div class="cal-header">
      <button class="cal-nav" id="calPrev">‹</button>
      <div class="cal-month" id="calMonth"></div>
      <button class="cal-nav" id="calNext">›</button>
    </div>
    <div class="cal-grid" id="calDayLabels"></div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <div class="view" id="view-stats">
    <div class="stats-grid">
      <div class="stat-card"><div class="big" id="statStreak">0</div><div class="lbl">🔥 현재 스트릭</div></div>
      <div class="stat-card"><div class="big" id="statBest">0</div><div class="lbl">🏆 최장 스트릭</div></div>
      <div class="stat-card"><div class="big" id="statWeekAvg">0%</div><div class="lbl">📅 이번 주 평균</div></div>
      <div class="stat-card"><div class="big" id="statMonthAvg">0%</div><div class="lbl">📆 이번 달 평균</div></div>
    </div>
    <div class="weekly-bar">
      <div class="weekly-title">최근 7일 달성률</div>
      <div class="bar-chart" id="barChart"></div>
    </div>
  </div>

  <div class="view" id="view-settings">
    <div id="settingsCats"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="openModal('addCat')">＋ 카테고리 추가</button>
    <div style="margin-top:20px;padding:16px;background:var(--bg2);border-radius:var(--radius);border:1px solid var(--bg3)">
      <div style="font-size:13px;color:var(--text2);margin-bottom:10px">데이터 관리</div>
      <button class="btn btn-cancel" style="width:100%;font-size:13px" onclick="resetData()">⚠️ 모든 데이터 초기화</button>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-btn active" data-view="today"><div class="nav-icon">✅</div><div class="nav-label">오늘</div></div>
  <div class="nav-btn" data-view="calendar"><div class="nav-icon">📅</div><div class="nav-label">캘린더</div></div>
  <div class="nav-btn" data-view="stats"><div class="nav-icon">📊</div><div class="nav-label">통계</div></div>
  <div class="nav-btn" data-view="settings"><div class="nav-icon">⚙️</div><div class="nav-label">설정</div></div>
</div>

<div class="confetti-wrap" id="confetti"></div>

<!-- Modal -->
<div class="modal-bg hidden" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">항목 추가</h3>
    <input id="mLabel" placeholder="항목 이름" />
    <input id="mNote" placeholder="설명 (선택, 예: 아침 식후)" />
    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" id="modalOk" onclick="modalSubmit()">추가</button>
    </div>
  </div>
</div>

<script>
// ── DATA ──
const DEFAULT = {
  cats:[
    {id:'health',emoji:'💪',name:'건강',color:'#22c55e',items:[
      {id:'h1',label:'영양제 복용',note:'아침 식후'},
      {id:'h2',label:'운동 30분+',note:'종류 무관'},
      {id:'h3',label:'수면 7시간+',note:'전날 밤 기준'},
    ]},
    {id:'english',emoji:'🇺🇸',name:'영어 학습',color:'#3b82f6',items:[
      {id:'e1',label:'영어 학습 20분+',note:'독해·청취·단어 무관'},
      {id:'e2',label:'영어 표현 1개 기록',note:''},
    ]},
    {id:'tech',emoji:'🧠',name:'AI·기술',color:'#8b5cf6',items:[
      {id:'t1',label:'AI 용어/트렌드 확인',note:'Daily-AI 파일'},
      {id:'t2',label:'배터리 논문/뉴스 1건',note:'Nexus 크론 결과'},
    ]},
    {id:'econ',emoji:'📈',name:'경제·자산',color:'#f59e0b',items:[
      {id:'ec1',label:'경제 뉴스 확인',note:''},
      {id:'ec2',label:'IRP·ISA 확인',note:'월 1회면 충분'},
    ]},
  ],
  history:{}, streak:0, bestStreak:0, lastDate:'',
};

function load(){try{return JSON.parse(localStorage.getItem('dt2'))||cp(DEFAULT);}catch{return cp(DEFAULT);}}
function save(){localStorage.setItem('dt2',JSON.stringify(D));}
function cp(o){return JSON.parse(JSON.stringify(o));}
let D=load();
let calYear,calMonth;

// ── DATE ──
function todayStr(){const n=new Date();return `${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`;}
function pad(n){return String(n).padStart(2,'0');}
function dateLabel(s){const d=new Date(s+'T00:00:00'),dn=['일','월','화','수','목','금','토'];return `${d.getMonth()+1}월 ${d.getDate()}일 (${dn[d.getDay()]})`;}
function prevDay(s){const d=new Date(s+'T00:00:00');d.setDate(d.getDate()-1);return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}

// ── STREAK ──
function dayRate(ds){
  const hist=D.history[ds]||{},all=D.cats.flatMap(c=>c.items);
  return all.length?all.filter(it=>hist[it.id]).length/all.length:0;
}
function updateStreak(){
  const today=todayStr();
  if(D.lastDate===today)return;
  if(D.lastDate===prevDay(today)&&dayRate(D.lastDate)>=1)D.streak++;
  else if(D.lastDate!==today)D.streak=0;
  D.lastDate=today;
  if(D.streak>D.bestStreak)D.bestStreak=D.streak;
  save();
}

// ── RENDER TODAY ──
function renderToday(){
  updateStreak();
  const today=todayStr(),hist=D.history[today]||{};
  const all=D.cats.flatMap(c=>c.items);
  const done=all.filter(it=>hist[it.id]).length,total=all.length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('dateStr').textContent=dateLabel(today);
  document.getElementById('streakVal').textContent=D.streak;
  document.getElementById('todayPct').textContent=pct+'%';
  document.getElementById('progDone').textContent=`${done}/${total} 완료`;
  document.getElementById('progFill').style.width=pct+'%';
  const msgs=['오늘도 화이팅! 💪','절반 왔어요! 👍','거의 다 왔어요! 🔥','완벽한 하루! 🎉'];
  document.getElementById('progMsg').textContent=pct===100?msgs[3]:pct>=60?msgs[2]:pct>=40?msgs[1]:msgs[0];
  document.getElementById('doneBanner').classList.toggle('show',pct===100);

  const container=document.getElementById('catList');
  container.innerHTML='';
  D.cats.forEach(cat=>{
    const cDone=cat.items.filter(it=>hist[it.id]).length;
    const cPct=cat.items.length?cDone/cat.items.length*100:0;
    const card=document.createElement('div');
    card.className='cat-card';
    card.innerHTML=`
      <div class="cat-header">
        <div class="cat-title"><span>${cat.emoji}</span><span>${cat.name}</span></div>
        <span class="cat-count">${cDone}/${cat.items.length}</span>
      </div>
      <div class="cat-prog"><div class="cat-prog-fill" style="width:${cPct}%;background:${cat.color}"></div></div>`;
    cat.items.forEach(item=>{
      const isDone=!!hist[item.id];
      const row=document.createElement('div');
      row.className='item'+(isDone?' done':'');
      row.innerHTML=`
        <div class="checkbox"><span class="check-icon">✓</span></div>
        <div class="item-content">
          <div class="item-label">${item.label}</div>
          ${item.note?`<div class="item-note">${item.note}</div>`:''}
        </div>
        <button class="item-edit-btn" title="수정">✏️</button>`;
      row.querySelector('.checkbox').addEventListener('click',e=>{e.stopPropagation();toggle(today,item.id);});
      row.querySelector('.item-content').addEventListener('click',()=>toggle(today,item.id));
      row.querySelector('.item-edit-btn').addEventListener('click',e=>{e.stopPropagation();openModal('editItem',cat.id,item.id);});
      card.appendChild(row);
    });
    const addBtn=document.createElement('div');
    addBtn.className='add-item-btn';
    addBtn.innerHTML='<span>＋</span><span>항목 추가</span>';
    addBtn.onclick=()=>openModal('addItem',cat.id);
    card.appendChild(addBtn);
    container.appendChild(card);
  });
}

function toggle(ds,itemId){
  if(!D.history[ds])D.history[ds]={};
  D.history[ds][itemId]=!D.history[ds][itemId];
  save();
  const all=D.cats.flatMap(c=>c.items);
  if(all.every(it=>D.history[ds][it.id]))launchConfetti();
  renderToday();
}

// ── CONFETTI ──
function launchConfetti(){
  const wrap=document.getElementById('confetti');wrap.innerHTML='';
  const cols=['#6366f1','#22c55e','#f59e0b','#ef4444','#3b82f6','#ec4899'];
  for(let i=0;i<60;i++){
    const el=document.createElement('div');el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}%;background:${cols[i%6]};animation-delay:${Math.random()*.4}s;animation-duration:${.8+Math.random()*.8}s;border-radius:${Math.random()>.5?'50%':'2px'};`;
    wrap.appendChild(el);
  }
  setTimeout(()=>wrap.innerHTML='',2000);
}

// ── CALENDAR ──
function renderCalendar(){
  const today=new Date();
  if(calYear===undefined){calYear=today.getFullYear();calMonth=today.getMonth();}
  document.getElementById('calMonth').textContent=`${calYear}년 ${calMonth+1}월`;
  const labels=['일','월','화','수','목','금','토'];
  document.getElementById('calDayLabels').innerHTML=labels.map(l=>`<div class="cal-day-label">${l}</div>`).join('');
  const first=new Date(calYear,calMonth,1).getDay();
  const days=new Date(calYear,calMonth+1,0).getDate();
  const ts=todayStr();
  let html='';
  for(let i=0;i<first;i++)html+='<div class="cal-day empty"></div>';
  for(let d=1;d<=days;d++){
    const ds=`${calYear}-${pad(calMonth+1)}-${pad(d)}`;
    const rate=dayRate(ds);
    const has=D.history[ds]&&Object.keys(D.history[ds]).length;
    const rc=has?(rate>=1?'rate-100':rate>=.5?'rate-hi':rate>0?'rate-lo':'rate-0'):'';
    html+=`<div class="cal-day ${ds===ts?'today':''} ${rc}"><div class="cal-day-num">${d}</div>${has?'<div class="cal-dot"></div>':'<div style="height:7px"></div>'}</div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
}
document.getElementById('calPrev').onclick=()=>{calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();};
document.getElementById('calNext').onclick=()=>{calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();};

// ── STATS ──
function renderStats(){
  document.getElementById('statStreak').textContent=D.streak;
  document.getElementById('statBest').textContent=D.bestStreak;
  const days7=[];
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days7.push(`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`);}
  const wr=days7.map(dayRate);
  document.getElementById('statWeekAvg').textContent=Math.round(wr.reduce((a,b)=>a+b,0)/7*100)+'%';
  const today=new Date();const mr=[];
  for(let d=1;d<=today.getDate();d++)mr.push(dayRate(`${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(d)}`));
  document.getElementById('statMonthAvg').textContent=Math.round(mr.reduce((a,b)=>a+b,0)/mr.length*100)+'%';
  const dn=['일','월','화','수','목','금','토'];
  const chart=document.getElementById('barChart');chart.innerHTML='';
  days7.forEach((ds,i)=>{
    const d=new Date(ds+'T00:00:00'),r=wr[i];
    const w=document.createElement('div');w.className='bar-wrap';
    w.innerHTML=`<div class="bar-pct">${Math.round(r*100)}%</div><div class="bar-col" style="height:${Math.max(r*100,4)}%"></div><div class="bar-label">${dn[d.getDay()]}</div>`;
    chart.appendChild(w);
  });
}

// ── SETTINGS ──
function renderSettings(){
  const wrap=document.getElementById('settingsCats');wrap.innerHTML='';
  D.cats.forEach(cat=>{
    const sec=document.createElement('div');sec.className='settings-section';
    sec.innerHTML=`<div class="settings-title" style="color:${cat.color}">${cat.emoji} ${cat.name}<button class="edit-icon-btn" onclick="openModal('addItem','${cat.id}')">＋ 항목</button></div>`;
    cat.items.forEach(item=>{
      const row=document.createElement('div');row.className='setting-row';
      row.innerHTML=`
        <div><div class="setting-label">${item.label}</div>${item.note?`<div class="setting-sub">${item.note}</div>`:''}</div>
        <div class="row-btns">
          <button class="edit-icon-btn" onclick="openModal('editItem','${cat.id}','${item.id}')">✏️</button>
          <button class="del-btn" onclick="deleteItem('${cat.id}','${item.id}')">×</button>
        </div>`;
      sec.appendChild(row);
    });
    wrap.appendChild(sec);
  });
}
function deleteItem(catId,itemId){
  if(!confirm('이 항목을 삭제할까요?'))return;
  const cat=D.cats.find(c=>c.id===catId);
  if(cat)cat.items=cat.items.filter(it=>it.id!==itemId);
  save();renderSettings();renderToday();
}
function resetData(){
  if(!confirm('모든 데이터를 초기화할까요?'))return;
  D=cp(DEFAULT);save();renderAll();
}

// ── MODAL ──
let mMode='',mCatId='',mItemId='';

function openModal(mode,catId,itemId){
  mMode=mode;mCatId=catId||'';mItemId=itemId||'';
  const titles={addItem:'항목 추가',editItem:'항목 수정',addCat:'카테고리 추가'};
  const okLabels={addItem:'추가',editItem:'저장',addCat:'추가'};
  document.getElementById('modalTitle').textContent=titles[mode];
  document.getElementById('modalOk').textContent=okLabels[mode];

  if(mode==='editItem'){
    const cat=D.cats.find(c=>c.id===catId);
    const item=cat?.items.find(it=>it.id===itemId);
    document.getElementById('mLabel').value=item?.label||'';
    document.getElementById('mNote').value=item?.note||'';
    document.getElementById('mLabel').placeholder='항목 이름';
    document.getElementById('mNote').placeholder='설명 (선택)';
  } else if(mode==='addCat'){
    document.getElementById('mLabel').value='';
    document.getElementById('mNote').value='';
    document.getElementById('mLabel').placeholder='카테고리 이름 (예: 독서)';
    document.getElementById('mNote').placeholder='이모지 (예: 📖)';
  } else {
    document.getElementById('mLabel').value='';
    document.getElementById('mNote').value='';
    document.getElementById('mLabel').placeholder='항목 이름 (예: 물 2L 마시기)';
    document.getElementById('mNote').placeholder='설명 (선택)';
  }
  document.getElementById('modalBg').classList.remove('hidden');
  setTimeout(()=>document.getElementById('mLabel').focus(),100);
}

function closeModal(){document.getElementById('modalBg').classList.add('hidden');}

function modalSubmit(){
  const label=document.getElementById('mLabel').value.trim();
  const note=document.getElementById('mNote').value.trim();
  if(!label)return;

  if(mMode==='editItem'){
    const cat=D.cats.find(c=>c.id===mCatId);
    const item=cat?.items.find(it=>it.id===mItemId);
    if(item){item.label=label;item.note=note;}
  } else if(mMode==='addItem'){
    const cat=D.cats.find(c=>c.id===mCatId);
    if(cat)cat.items.push({id:'u'+Date.now(),label,note});
  } else if(mMode==='addCat'){
    const emoji=note||'📌';
    const cols=['#6366f1','#22c55e','#f59e0b','#ef4444','#3b82f6','#ec4899','#14b8a6'];
    D.cats.push({id:'c'+Date.now(),emoji,name:label,color:cols[D.cats.length%cols.length],items:[]});
  }
  save();closeModal();renderToday();renderSettings();
}

document.getElementById('mLabel').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('mNote').focus();});
document.getElementById('mNote').addEventListener('keydown',e=>{if(e.key==='Enter')modalSubmit();});
document.getElementById('modalBg').addEventListener('click',e=>{if(e.target===document.getElementById('modalBg'))closeModal();});

// ── NAV ──
function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab,.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.querySelectorAll(`[data-view="${name}"]`).forEach(b=>b.classList.add('active'));
  if(name==='calendar')renderCalendar();
  if(name==='stats')renderStats();
  if(name==='settings')renderSettings();
}
document.querySelectorAll('.tab,.nav-btn').forEach(btn=>btn.addEventListener('click',()=>showView(btn.dataset.view)));

// ── INIT ──
function renderAll(){renderToday();}
if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
renderAll();
</script>
